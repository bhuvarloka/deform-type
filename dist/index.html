<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Deform Type</title>
    <script type="module" crossorigin src="./assets/index-eFEDDKfY.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-DcImprAK.css">
  </head>
  <body>
    <main></main>

    <aside id="settings-panel" class="panel translate-x-full">
      <div class="panel-card">
        <h2 class="panel-title">Settings</h2>

        <!-- Message -->
        <div class="panel-section">
          <h3 class="section-heading">Message</h3>
          <textarea
            id="message-input"
            rows="2"
            placeholder="Enter your message…"
            class="panel-textarea"
          ></textarea>
          <p class="hint">Press Enter to apply.</p>
        </div>

        <!-- Typography -->
        <div class="panel-section">
          <h3 class="section-heading">Typography</h3>
          <label id="font-drop-zone" class="drop-zone">
            <span id="font-drop-label">Drop or click to upload</span>
            <input
              type="file"
              id="font-upload-input"
              accept=".ttf,.otf"
              class="sr-only"
            />
          </label>
          <p class="hint">Accepts .TTF or .OTF</p>
          <label class="panel-row">
            <span class="panel-row-label">Size <span class="panel-row-sublabel">72 – 640</span></span>
            <input
              id="font-size-input"
              type="number"
              min="72"
              max="640"
              value="320"
              class="number-input"
            />
          </label>
          <label class="panel-row">
            <span class="panel-row-label">Columns <span class="panel-row-sublabel">2 – 6</span></span>
            <input
              id="cols-input"
              type="number"
              min="2"
              max="6"
              value="4"
              class="number-input"
            />
          </label>
        </div>

        <!-- Animation -->
        <div class="panel-section">
          <h3 class="section-heading">Animation</h3>
          <label class="panel-row">
            <span class="panel-row-label">Noise</span>
            <span class="toggle">
              <input type="checkbox" id="noise-toggle-input" class="sr-only" />
              <span class="toggle-track"><span class="toggle-thumb"></span></span>
            </span>
          </label>
          <label class="panel-row">
            <span class="panel-row-label">Speed <span class="panel-row-sublabel">1 – 24</span></span>
            <input
              id="noise-speed-input"
              type="number"
              min="1"
              max="24"
              step="1"
              value="8"
              class="number-input"
            />
          </label>
          <label class="panel-row">
            <span class="panel-row-label">Amount <span class="panel-row-sublabel">48 – 320</span></span>
            <input
              id="noise-amount-input"
              type="number"
              min="48"
              max="320"
              step="8"
              value="240"
              class="number-input"
            />
          </label>
          <p class="hint">Handles hide while noise is active.</p>
        </div>

        <!-- Colors -->
        <div class="panel-section">
          <h3 class="section-heading">Colors</h3>
          <div class="swatch-row">
            <label class="color-swatch">
              <input type="color" id="bg-color-input" value="#2b2b2b" class="sr-only" />
              <span id="bg-color-swatch" class="swatch-fill" style="background: #2b2b2b"></span>
            </label>
            <label class="color-swatch">
              <input type="color" id="font-color-input" value="#b4b4b4" class="sr-only" />
              <span id="font-color-swatch" class="swatch-fill" style="background: #b4b4b4"></span>
            </label>
          </div>
          <p class="hint">Background and Type</p>
        </div>

        <!-- Reset -->
        <div class="panel-footer">
          <button id="reset-btn" class="panel-reset-btn">Reset</button>
        </div>
      </div>
    </aside>

    <button id="settings-trigger" class="panel-trigger">
      <img alt="Settings" class="w-full h-full object-contain" />
    </button>

  </body>
</html>
